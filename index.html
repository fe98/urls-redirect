<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Static CSV URL Shortener</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 60px;
      background: #f4f4f4;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 8px 0;
    }
    code {
      background: #eee;
      padding: 4px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>My URL Shortener</h1>
  <p>Available short links:</p>
  <ul id="links"></ul>

  <script>
    const repoName = "repository-name"; // ← CHANGE THIS

    fetch("links.csv")
      .then(response => response.text())
      .then(data => {
        const lines = data.split("\n").slice(1);
        const list = document.getElementById("links");

        lines.forEach(line => {
          if (!line.trim()) return;
          const [slug] = line.split(",");
          const li = document.createElement("li");
          li.innerHTML = `<code>/${slug}</code>`;
          list.appendChild(li);
        });
      });
  </script>
</body>
</html>
